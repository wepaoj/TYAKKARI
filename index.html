<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TYÄKKÄRI – Myy osaamistasi | Löydä osaaja</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <!-- Leaflet kartta -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=Space+Grotesk:wght@500&amp;display=swap');
        
        body { font-family: 'Inter', system_ui, sans-serif; }
        .logo-font { font-family: 'Space Grotesk', sans-serif; }

        .hero-bg {
            background: linear-gradient(90deg, #00c48c 0%, #00a86b 100%);
        }

        .card-hover {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .card-hover:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1), 0 8px 10px -6px rgb(0 0 0 / 0.1);
        }

        #map {
            height: 480px;
            border-radius: 24px;
            border: 3px solid #10b981;
        }

        .leaflet-popup-content-wrapper {
            border-radius: 16px;
        }
    </style>
</head>
<body class="bg-gray-50">

    <!-- NAVBAR -->
    <nav class="bg-white border-b sticky top-0 z-50 shadow-sm">
        <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
            <div class="flex items-center gap-x-2">
                <div class="w-9 h-9 bg-emerald-500 rounded-2xl flex items-center justify-center text-white text-2xl">🛠️</div>
                <h1 class="logo-font text-3xl font-semibold tracking-tighter text-emerald-600">TYÄKKÄRI</h1>
            </div>

            <!-- Hakukenttä -->
            <div class="flex-1 max-w-xl mx-8">
                <div class="relative">
                    <input id="searchInput" type="text" placeholder="Etsi osaajia tai kaupunkia... (esim. Helsinki, Maalari)"
                           class="w-full bg-gray-100 border border-transparent focus:border-emerald-400 focus:bg-white h-12 pl-12 pr-6 rounded-3xl text-base placeholder-gray-500 focus:outline-none"
                           onkeyup="if(event.key === 'Enter') performSearch()">
                    <div class="absolute left-5 top-1/2 -translate-y-1/2 text-emerald-500">
                        <i class="fa-solid fa-magnifying-glass text-xl"></i>
                    </div>
                    <button onclick="performSearch()" 
                            class="absolute right-2 top-1/2 -translate-y-1/2 bg-emerald-500 hover:bg-emerald-600 text-white h-9 w-9 rounded-2xl flex items-center justify-center">
                        <i class="fa-solid fa-arrow-right"></i>
                    </button>
                </div>
            </div>

            <div class="flex items-center gap-x-8 text-sm font-medium">
                <a onclick="toggleMap()" class="hover:text-emerald-600 flex items-center gap-x-1 cursor-pointer">
                    <i class="fa-solid fa-map"></i>
                    <span>Kartta</span>
                </a>
                <a onclick="showPostModal()" 
                   class="flex items-center gap-x-2 bg-white border-2 border-emerald-500 text-emerald-600 hover:bg-emerald-50 px-6 h-10 rounded-3xl font-semibold">
                    <i class="fa-solid fa-plus"></i>
                    <span>MYY OSAAMISESI</span>
                </a>
                <a onclick="fakeLogin()" class="flex items-center gap-x-1 hover:text-emerald-600">
                    <i class="fa-solid fa-user-circle text-2xl"></i>
                </a>
            </div>
        </div>

        <!-- Pikakategoriat -->
        <div class="bg-white border-t px-6 py-3 overflow-x-auto">
            <div class="flex gap-x-2 text-sm whitespace-nowrap" id="quickCategories"></div>
        </div>
    </nav>

    <!-- HERO -->
    <header class="hero-bg text-white py-16">
        <div class="max-w-7xl mx-auto px-6">
            <div class="grid lg:grid-cols-12 gap-12 items-center">
                <div class="lg:col-span-7">
                    <h2 class="text-6xl font-semibold tracking-tighter leading-none mb-6">
                        Löydä lähin osaaja.<br>Myy osaamisesi.<br><span class="text-emerald-200">Kartalla.</span>
                    </h2>
                    <p class="text-xl text-emerald-100">Hae palveluita ja näe osaajat suoraan kartalla</p>
                </div>
            </div>
        </div>
    </header>

    <div class="max-w-7xl mx-auto px-6 py-8">
        <div class="flex justify-between items-center mb-6">
            <h3 id="resultsTitle" class="text-3xl font-semibold">Suosittuja palveluita</h3>
            
            <div class="flex items-center gap-x-4">
                <button onclick="toggleMap()" id="mapBtn"
                        class="flex items-center gap-x-2 bg-white border border-emerald-200 hover:border-emerald-400 px-5 h-10 rounded-3xl text-sm font-medium">
                    <i class="fa-solid fa-map"></i>
                    <span id="mapBtnText">Näytä kartta</span>
                </button>
                <span onclick="clearSearch()" class="text-emerald-600 hover:underline cursor-pointer text-sm">Tyhjennä</span>
            </div>
        </div>

        <!-- KARTTA -->
        <div id="mapContainer" class="hidden mb-10">
            <div id="map"></div>
            <div class="text-xs text-gray-500 mt-2 text-center">
                🔴 Punaiset merkit = saatavilla olevat osaajat • Klikkaa merkkiä nähdäksesi palvelun
            </div>
        </div>

        <!-- Palvelukortit -->
        <div id="gigsGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6"></div>
    </div>

    <!-- JULKAISU MODAL -->
    <div id="postModal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-[9999]">
        <div class="bg-white rounded-3xl max-w-lg w-full mx-4">
            <div class="px-8 pt-6 pb-4 border-b flex justify-between">
                <h2 class="text-2xl font-semibold">Julkaise uusi palvelu</h2>
                <i onclick="hidePostModal()" class="fa-solid fa-xmark text-3xl cursor-pointer"></i>
            </div>
            <div class="p-8 space-y-6">
                <input id="modalTitle" type="text" placeholder="Palvelun nimi" class="w-full border rounded-2xl px-5 py-4">
                <select id="modalCategory" class="w-full border rounded-2xl px-5 py-4">
                    <option>Maalari</option><option>Remonttimies</option><option>Koodari</option>
                    <option>Lastenhoitaja</option><option>Asianajaja</option><option>Siivooja</option>
                </select>
                <input id="modalPrice" type="text" placeholder="Hinta alkaen (esim. 149 €)" class="w-full border rounded-2xl px-5 py-4">
                <input id="modalLocation" type="text" placeholder="Kaupunki (Helsinki, Tampere...)" value="Helsinki" class="w-full border rounded-2xl px-5 py-4">
                <textarea id="modalDesc" rows="3" placeholder="Kuvaus..." class="w-full border rounded-3xl px-5 py-4"></textarea>
            </div>
            <div class="px-8 py-6 bg-gray-50 flex justify-end gap-4">
                <button onclick="hidePostModal()" class="px-8 py-3">Peruuta</button>
                <button onclick="publishGig()" class="bg-emerald-600 text-white px-10 py-3 rounded-3xl">Julkaise</button>
            </div>
        </div>
    </div>

    <script>
        // Laajennettu data sijainneilla
        let allGigs = [
            {id:1, category:"Maalari", title:"Ammattimainen huoneistomaalaus", price:"Alkaen 149 €", rating:4.9, reviews:87, seller:"Juha Mäkinen", location:"Helsinki", lat:60.1699, lng:24.9384, emoji:"🎨"},
            {id:2, category:"Remonttimies", title:"Kodin täydellinen remontti", price:"Alkaen 890 €", rating:5, reviews:43, seller:"Pekka Korhonen", location:"Espoo", lat:60.2055, lng:24.6559, emoji:"🔨"},
            {id:3, category:"Koodari", title:"Verkkosivut ja web-applikaatiot", price:"Alkaen 299 €", rating:4.8, reviews:124, seller:"Laura Virtanen", location:"Tampere", lat:61.4978, lng:23.7605, emoji:"💻"},
            {id:4, category:"Lastenhoitaja", title:"Luotettava lastenhoito", price:"Alkaen 18 €/h", rating:4.95, reviews:66, seller:"Sanna Lehtonen", location:"Turku", lat:60.4518, lng:22.2666, emoji:"🧸"},
            {id:5, category:"Asianajaja", title:"Oikeudellinen apu", price:"Alkaen 89 €", rating:5, reviews:31, seller:"Mikko Rantanen", location:"Oulu", lat:65.0121, lng:25.4651, emoji:"⚖️"},
            {id:6, category:"Maalari", title:"Sisämaalaus + tapetointi", price:"Alkaen 220 €", rating:4.7, reviews:19, seller:"Anna Kivinen", location:"Jyväskylä", lat:62.2415, lng:25.7209, emoji:"🖌️"},
            {id:7, category:"Koodari", title:"Python & automaatiot", price:"Alkaen 450 €", rating:4.9, reviews:52, seller:"Tomi Nieminen", location:"Vantaa", lat:60.2934, lng:24.8580, emoji:"🐍"},
            {id:8, category:"Siivooja", title:"Kotisiivous", price:"Alkaen 35 €/h", rating:5, reviews:94, seller:"Minna Koskinen", location:"Kuopio", lat:62.8984, lng:27.6782, emoji:"🧹"},
            {id:9, category:"Lastenhoitaja", title:"Iltahoito lapsille", price:"Alkaen 22 €/h", rating:4.8, reviews:28, seller:"Emilia Huttunen", location:"Lahti", lat:60.9833, lng:25.6564, emoji:"🌙"},
            {id:10, category:"Graafikko", title:"Logot ja brändäys", price:"Alkaen 79 €", rating:5, reviews:71, seller:"Ville Laine", location:"Helsinki", lat:60.1699, lng:24.9384, emoji:"🎨"}
        ]

        let map, markers = []
        let mapVisible = false

        function initMap() {
            map = L.map('map', { zoomControl: true }).setView([64.5, 25.5], 6) // Keskellä Suomea
            
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '&copy; OpenStreetMap',
                maxZoom: 18
            }).addTo(map)

            updateMarkers(allGigs)
        }

        function updateMarkers(gigs) {
            // Poista vanhat markerit
            markers.forEach(m => map.removeLayer(m))
            markers = []

            gigs.forEach(gig => {
                if (!gig.lat || !gig.lng) return
                
                const marker = L.marker([gig.lat, gig.lng]).addTo(map)
                
                marker.bindPopup(`
                    <div class="text-center">
                        <div class="text-4xl mb-2">${gig.emoji}</div>
                        <b>${gig.title}</b><br>
                        <small>${gig.seller} • ${gig.location}</small><br>
                        <span class="text-emerald-600 font-semibold">${gig.price}</span>
                        <br><button onclick="viewGig(${gig.id});map.closePopup()" 
                               class="mt-3 text-xs bg-emerald-600 text-white px-4 py-1 rounded-3xl">Ota yhteyttä</button>
                    </div>
                `)
                
                markers.push(marker)
            })
        }

        function toggleMap() {
            const container = document.getElementById('mapContainer')
            mapVisible = !mapVisible
            
            if (mapVisible) {
                container.classList.remove('hidden')
                document.getElementById('mapBtnText').textContent = "Piilota kartta"
                if (!map) initMap()
                else updateMarkers(allGigs)
            } else {
                container.classList.add('hidden')
                document.getElementById('mapBtnText').textContent = "Näytä kartta"
            }
        }

        function renderGigs(gigs) {
            const container = document.getElementById('gigsGrid')
            container.innerHTML = ''
            
            gigs.forEach(gig => {
                const html = `
                <div onclick="viewGig(${gig.id})" class="card-hover bg-white border border-gray-200 rounded-3xl overflow-hidden cursor-pointer">
                    <div class="h-2 bg-emerald-500"></div>
                    <div class="p-5">
                        <div class="flex justify-between">
                            <div class="text-5xl">${gig.emoji}</div>
                            <div class="text-right">
                                <div class="font-semibold text-emerald-600">${gig.price}</div>
                                <div class="text-amber-400 text-sm">★ ${gig.rating} (${gig.reviews})</div>
                            </div>
                        </div>
                        <h4 class="font-semibold mt-4">${gig.title}</h4>
                        <p class="text-sm text-gray-500">${gig.seller} • ${gig.location}</p>
                        <div class="mt-6 flex justify-between items-center">
                            <span class="text-xs bg-emerald-100 text-emerald-700 px-3 py-1 rounded-3xl">${gig.category}</span>
                            <button onclick="event.stopImmediatePropagation(); contactSeller(${gig.id})" 
                                    class="text-xs bg-emerald-600 text-white px-5 py-2 rounded-3xl">Ota yhteyttä</button>
                        </div>
                    </div>
                </div>`
                container.innerHTML += html
            })
        }

        function performSearch() {
            const term = document.getElementById('searchInput').value.toLowerCase().trim()
            let filtered = allGigs

            if (term) {
                filtered = allGigs.filter(g => 
                    g.title.toLowerCase().includes(term) ||
                    g.category.toLowerCase().includes(term) ||
                    g.seller.toLowerCase().includes(term) ||
                    g.location.toLowerCase().includes(term)
                )
            }

            document.getElementById('resultsTitle').innerHTML = term 
                ? `Tulokset: "${term}" <span class="text-emerald-500">(${filtered.length})</span>` 
                : `Suosittuja palveluita <span class="text-emerald-500">(${filtered.length})</span>`

            renderGigs(filtered)
            if (map) updateMarkers(filtered)
        }

        function createQuickCategories() {
            const cats = ["Maalari","Remonttimies","Koodari","Lastenhoitaja","Asianajaja","Siivooja"]
            const container = document.getElementById('quickCategories')
            container.innerHTML = cats.map(cat => `
                <button onclick="filterByCategory('${cat}')" 
                        class="bg-white border border-gray-200 hover:border-emerald-400 px-6 h-9 rounded-3xl text-sm flex items-center gap-2 whitespace-nowrap">
                    ${cat}
                </button>
            `).join('')
        }

        function filterByCategory(cat) {
            document.getElementById('searchInput').value = cat
            const filtered = allGigs.filter(g => g.category === cat)
            document.getElementById('resultsTitle').innerHTML = `${cat} <span class="text-emerald-500">(${filtered.length})</span>`
            renderGigs(filtered)
            if (map) updateMarkers(filtered)
        }

        function publishGig() {
            const title = document.getElementById('modalTitle').value || "Uusi palvelu"
            const category = document.getElementById('modalCategory').value
            const price = document.getElementById('modalPrice').value || "Alkaen 99 €"
            const location = document.getElementById('modalLocation').value || "Helsinki"
            const desc = document.getElementById('modalDesc').value || ""

            const newGig = {
                id: Date.now(),
                category, title, price,
                rating: 5, reviews: 1,
                seller: "Sinä",
                location,
                lat: 60.1699 + (Math.random() * 4 - 2),
                lng: 24.9384 + (Math.random() * 4 - 2),
                emoji: "🚀"
            }

            allGigs.unshift(newGig)
            hidePostModal()
            renderGigs(allGigs)
            if (map) updateMarkers(allGigs)

            const toast = document.createElement('div')
            toast.style.cssText = 'position:fixed;bottom:30px;right:30px;background:#10b981;color:white;padding:16px 28px;border-radius:9999px;box-shadow:0 10px 15px -3px rgb(0 0 0 / 0.3);'
            toast.innerHTML = `✅ Ilmoitus julkaistu! Nyt näkyvissä kartalla.`
            document.body.appendChild(toast)
            setTimeout(() => toast.remove(), 3500)
        }

        function showPostModal() {
            document.getElementById('postModal').classList.remove('hidden')
            document.getElementById('postModal').classList.add('flex')
        }
        function hidePostModal() {
            const m = document.getElementById('postModal')
            m.classList.add('hidden')
            m.classList.remove('flex')
        }

        function viewGig(id) {
            const gig = allGigs.find(g => g.id === id)
            if (gig) alert(`📍 ${gig.title}\n\n${gig.seller} • ${gig.location}\nHinta: ${gig.price}\n\n💬 Haluatko lähettää viestin?`)
        }

        function contactSeller(id) {
            alert("💬 Viesti lähetetty! Myyjä vastaa yleensä alle tunnissa.")
            event.stopImmediatePropagation()
        }

        function fakeLogin() {
            alert("👋 Tervetuloa TYÄKKÄRIin!")
        }

        function clearSearch() {
            document.getElementById('searchInput').value = ''
            renderGigs(allGigs)
            document.getElementById('resultsTitle').innerHTML = `Suosittuja palveluita <span class="text-emerald-500">(${allGigs.length})</span>`
            if (map) updateMarkers(allGigs)
        }

        // Käynnistys
        window.onload = () => {
            createQuickCategories()
            renderGigs(allGigs)
            console.log('%c✅ TYÄKKÄRI kartalla – valmis!', 'color:#10b981;font-size:12px')
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TYÄKKÄRI – Myy osaamistasi | Löydä osaaja</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=Space+Grotesk:wght@500;600&amp;display=swap');
        body { font-family: 'Inter', system_ui, sans-serif; }
        .logo-font { font-family: 'Space Grotesk', sans-serif; }
        .hero-bg { background: linear-gradient(90deg, #00c48c 0%, #00a86b 100%); }
        .card-hover { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .card-hover:hover { transform: translateY(-8px); box-shadow: 0 25px 50px -12px rgb(0 0 0 / 0.15); }
        #map { height: 520px; border-radius: 24px; }
        .profile-modal { animation: fadeInScale 0.3s ease; }
        @keyframes fadeInScale { from { opacity:0; transform:scale(0.95); } to { opacity:1; transform:scale(1); } }
    </style>
</head>
<body class="bg-gray-50">

    <!-- NAVBAR -->
    <nav class="bg-white border-b sticky top-0 z-50 shadow-sm">
        <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
            <div class="flex items-center gap-x-2">
                <div class="w-10 h-10 bg-emerald-500 rounded-3xl flex items-center justify-center text-white text-3xl">🛠️</div>
                <h1 class="logo-font text-4xl font-bold tracking-tighter text-emerald-600">TYÄKKÄRI</h1>
            </div>

            <div class="flex-1 max-w-2xl mx-8">
                <div class="relative">
                    <input id="searchInput" type="text" placeholder="Etsi palvelua tai kaupunkia... (esim. csgo, wordpress, hevonen)"
                           class="w-full bg-gray-100 border-2 border-transparent focus:border-emerald-500 h-14 pl-14 pr-6 rounded-3xl text-lg focus:outline-none"
                           onkeyup="if(event.key==='Enter') performSearch()">
                    <i class="fa-solid fa-magnifying-glass absolute left-6 top-1/2 -translate-y-1/2 text-emerald-500 text-2xl"></i>
                </div>
            </div>

            <div class="flex items-center gap-x-6">
                <button onclick="showCategoryExplorer()" class="flex items-center gap-x-2 text-emerald-700 hover:text-emerald-800 font-medium">
                    <i class="fa-solid fa-layer-group"></i><span>Kategoriat</span>
                </button>
                <button onclick="toggleMap()" class="flex items-center gap-x-2 text-emerald-700 hover:text-emerald-800 font-medium">
                    <i class="fa-solid fa-map"></i><span>Kartta</span>
                </button>
                <button onclick="showPostModal()" class="bg-emerald-600 hover:bg-emerald-700 text-white px-8 py-3 rounded-3xl font-semibold flex items-center gap-x-2">
                    <i class="fa-solid fa-plus"></i> 
                    <span>MYY OSAAMISESI</span>
                </button>
            </div>
        </div>
    </nav>

  <!-- HERO - Päivitetty -->
    <header class="hero-bg text-white py-24">
        <div class="max-w-7xl mx-auto px-6 text-center">
            <h1 class="text-6xl md:text-7xl font-bold tracking-tighter leading-none mb-6">
                Sinä osaat.<br>Sinä tienaat.
            </h1>
            <p class="text-2xl md:text-3xl text-emerald-100 max-w-2xl mx-auto">
                Nyt on aika tienata sillä – suomalaiselta suomalaiselle
            </p>
        </div>
    </header>

    <div class="max-w-7xl mx-auto px-6 py-10">
        <div id="mainCategories" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-5 gap-4 mb-12"></div>

        <div class="flex justify-between items-end mb-6">
            <h2 id="resultsTitle" class="text-3xl font-semibold">Suosituimmat palvelut</h2>
            <button onclick="clearSearch()" class="text-emerald-600 text-sm flex items-center gap-x-1">
                <i class="fa-solid fa-rotate"></i> Tyhjennä haku
            </button>
        </div>

        <!-- KARTTA -->
        <div id="mapContainer" class="hidden mb-10">
            <div id="map"></div>
        </div>

        <div id="gigsGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6"></div>
    </div>

    <!-- PROFIILI MODAL -->
    <div id="profileModal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-[9999] p-4">
        <div class="bg-white rounded-3xl max-w-4xl w-full max-h-[95vh] overflow-auto profile-modal">
            <div class="sticky top-0 bg-white border-b z-10 px-8 py-5 flex justify-between items-center">
                <div id="profileHeader" class="flex items-center gap-x-4"></div>
                <button onclick="closeProfile()" class="text-4xl leading-none text-gray-400 hover:text-black">×</button>
            </div>
            <div class="p-8">
                <div class="mb-10">
                    <h3 class="font-semibold text-xl mb-4">Työnäytteet</h3>
                    <div id="workImages" class="grid grid-cols-2 md:grid-cols-3 gap-4"></div>
                </div>
                <div id="profileDesc" class="prose mb-10 text-gray-700"></div>
                <div>
                    <h3 class="font-semibold text-xl mb-6">Asiakasarvostelut</h3>
                    <div id="reviewsContainer" class="space-y-8"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Muut modalit -->
    <div id="categoryModal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-[9999]">
        <div class="bg-white rounded-3xl max-w-6xl w-full mx-4 max-h-[90vh] overflow-hidden flex flex-col">
            <div class="px-8 py-6 border-b flex justify-between items-center">
                <h2 class="text-3xl font-semibold">Kaikki kategoriat</h2>
                <button onclick="hideCategoryModal()" class="text-4xl">×</button>
            </div>
            <div class="flex-1 overflow-auto p-8" id="categoryContent"></div>
        </div>
    </div>

    <div id="postModal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-[9999]">
        <div class="bg-white rounded-3xl max-w-lg w-full mx-4 p-8">
            <h2 class="text-2xl font-semibold mb-6">Julkaise uusi palvelu</h2>
            <select id="modalCategory" class="w-full border rounded-2xl px-5 py-4 mb-4"></select>
            <input id="modalSub" type="text" placeholder="Tarkka ammattinimike" class="w-full border rounded-2xl px-5 py-4 mb-4">
            <input id="modalPrice" type="text" placeholder="Hinta alkaen" class="w-full border rounded-2xl px-5 py-4 mb-4">
            <input id="modalLocation" type="text" placeholder="Kaupunki" value="Helsinki" class="w-full border rounded-2xl px-5 py-4 mb-4">
            <button onclick="publishGig()" class="w-full bg-emerald-600 text-white py-4 rounded-3xl font-semibold">Julkaise</button>
        </div>
    </div>

    <script>
        const categories = [ /* 19 kategoriaa */ 
            {name:"Rakentaminen & remontointi", emoji:"🏗️", subs:["Keittiöremontti","Kylpyhuoneremontti","Maalaus","Laatoitus","Parketti","Terassi","Sähkötyöt","Putkityöt","Kattotyöt","Piharakentaminen"]},
            {name:"IT & ohjelmistokehitys", emoji:"💻", subs:["Verkkosivut","Verkkokauppa","Mobiilisovellus","API-kehitys","Bugikorjaus","WordPress","Shopify","AI-chatbot","Automaatio","Tietoturva"]},
            {name:"Design & visuaalinen", emoji:"🎨", subs:["Logosuunnittelu","Brändi-ilme","UI/UX","Esitteet","Pakkausdesign","Some-grafiikka","Infografiikka","Kuvankäsittely","Presentaatiot","Bannerit"]},
            {name:"Media & sisältö", emoji:"📸", subs:["Valokuvaus","Videokuvaus","Editointi","Blogitekstit","Copywriting","Tuotekuvaukset","Podcast-editointi","Some-sisältö","Drone-kuvaus","Kuvapankki"]},
            {name:"Musiikki & ääni", emoji:"🎧", subs:["Biisituotanto","Miksaus","Voice-over","Jinglet","Taustamusiikki","Podcast","Studiopalvelu","DJ","Sävellys","Äänisuunnittelu"]},
            {name:"Markkinointi & myynti", emoji:"📣", subs:["SEO","Google Ads","Some-mainonta","Sähköposti","Sisältöstrategia","Brändistrategia","Lead generation","Myyntitekstit","Analytiikka","CRO"]},
            {name:"Liiketoiminta & konsultointi", emoji:"📊", subs:["Liiketoimintasuunnitelma","Markkina-analyysi","Hinnoittelu","Startup-neuvonta","Prosessit","HR","Pitch deck","Kasvustrategia","Operatiivinen","Rahoitus"]},
            {name:"Juridiset palvelut", emoji:"⚖️", subs:["Sopimukset","Sopimusten tarkistus","Yrityksen perustaminen","IPR","Työoikeus","Riidanratkaisu","GDPR","Vuokrasopimus","Velkomus","Yritysjuridiikka"]},
            {name:"Talous & kirjanpito", emoji:"💰", subs:["Kirjanpito","Tilinpäätös","Veroilmoitus","Palkanlaskenta","Laskutus","Raportointi","Budjetointi","Kassavirta","ALV","Talouskonsultointi"]},
            {name:"Opetus & koulutus", emoji:"📚", subs:["Matematiikka","Kielet","Ohjelmointi","Musiikki","Urheiluvalmennus","Pelivalmennus (CS:GO jne)","Pääsykokeet","Yrityskoulutus","Online-kurssit","Oppimisvalmennus"]},
            {name:"Käännökset & kielet", emoji:"🌍", subs:["EN–FI","FI–EN","SE–FI","Oikoluku","Editointi","Lokalisointi","Tekstitys","Transkriptio","SEO-käännös","Virallinen käännös"]},
            {name:"Hoiva & hyvinvointi", emoji:"🧘", subs:["Lastenhoito","Vanhustenhoito","Avustaja","Personal trainer","Ravinto","Hieronta","Jooga","Coaching","Fysioterapia","Kotikäynti"]},
            {name:"Eläinpalvelut", emoji:"🐶", subs:["Koiran ulkoilutus","Lemmikkien hoito","Hevosten hoito","Eläinkoulutus","Lemmikkivahti","Trimmaus","Eläinkuljetus","Tallityöt","Eläinvalokuvaus","Ruokinta"]},
            {name:"Tapahtumat & viihde", emoji:"🎉", subs:["DJ","Bändi","Juontaja","Tapahtumatuotanto","Ääni & valo","Lasten viihde","Taikuri","Catering","Yritystapahtuma","Häät"]},
            {name:"Kuljetus & logistiikka", emoji:"🚚", subs:["Muutto","Pienkuljetus","Huonekalut","Varastointi","Jakelu","Nouto","Rakennuskuljetus","Kierrätys","Lentokenttä","Courier"]},
            {name:"Siivous & kotipalvelut", emoji:"🧹", subs:["Kotisiivous","Toimisto","Ikkunat","Muuttosiivous","Suursiivous","Pyykki","Silitys","Pihatyöt","Lumityöt","Roskat"]},
            {name:"Korjaus & huolto", emoji:"🔧", subs:["Kodinkoneet","Puhelin","Tietokone","Polkupyörä","Auto","Elektroniikka","Huonekalut","Lukko","Ilmastointi","Asennus"]},
            {name:"Kauneus & terveys", emoji:"💄", subs:["Hiukset","Värjäys","Meikkaus","Kynnet","Iho","Ripset","Parturi","Hieronta","Kosmetologi","Spa"]},
            {name:"Muut palvelut", emoji:"🧩", subs:["Virtuaaliassistentti","Data entry","Testikäyttäjä","Mystery shopping","Lahjapalvelu","Personoidut videot","Sukututkimus","Astrologia","Erikoistyöt","Muut"]}
        ]

        let allGigs = []
        let map = null

        function generateGigs() {
            allGigs = []
            let id = 1
            categories.forEach((cat) => {
                cat.subs.forEach(sub => {
                    allGigs.push({
                        id: id++,
                        category: cat.name,
                        sub: sub,
                        title: sub,
                        price: ["Alkaen 49 €","Alkaen 89 €","Alkaen 129 €","Alkaen 35 €/h","Alkaen 199 €"][Math.floor(Math.random()*5)],
                        rating: (4.5 + Math.random()*0.5).toFixed(1),
                        reviewsCount: Math.floor(Math.random()*80) + 12,
                        seller: ["Juha Mäkinen","Anna Korhonen","Pekka Tammela","Laura Virtanen","Mikko Rantanen"][Math.floor(Math.random()*5)],
                        location: ["Helsinki","Espoo","Tampere","Turku","Oulu","Jyväskylä"][Math.floor(Math.random()*6)],
                        lat: 59.5 + Math.random()*7,
                        lng: 20 + Math.random()*12,
                        emoji: cat.emoji,
                        tags: [sub.toLowerCase(), cat.name.toLowerCase()],
                        desc: `Ammattitaitoinen ${sub.toLowerCase()}.`,
                        images: [`https://picsum.photos/id/${100+id}/800/500`, `https://picsum.photos/id/${200+id}/800/500`],
                        reviews: [{name:"Sari L.", stars:5, text:"Erinomainen!", date:"2 pv sitten"}]
                    })
                })
            })
        }

        function renderMainCategories() {
            const container = document.getElementById('mainCategories')
            container.innerHTML = categories.map(cat => `
                <div onclick="selectMainCategory('${cat.name}')" class="bg-white border border-gray-200 hover:border-emerald-400 rounded-3xl p-6 cursor-pointer transition-all">
                    <div class="text-5xl mb-4">${cat.emoji}</div>
                    <h3 class="font-semibold text-xl">${cat.name}</h3>
                    <p class="text-emerald-600 text-sm mt-1">${cat.subs.length} ammattia</p>
                </div>
            `).join('')
        }

        function renderGigs(gigs) {
            const container = document.getElementById('gigsGrid')
            container.innerHTML = gigs.map(g => `
                <div onclick="openProfile(${g.id})" class="card-hover bg-white border border-gray-100 rounded-3xl overflow-hidden cursor-pointer">
                    <div class="h-2 bg-emerald-500"></div>
                    <div class="p-6">
                        <div class="text-6xl mb-4">${g.emoji}</div>
                        <h4 class="font-semibold text-lg">${g.title}</h4>
                        <p class="text-emerald-600 font-medium mt-1">${g.price}</p>
                        <p class="text-sm text-gray-500 mt-4">${g.seller} • ${g.location}</p>
                        <div class="flex justify-between mt-6">
                            <span class="text-amber-400 text-sm">★ ${g.rating} (${g.reviewsCount})</span>
                            <span class="text-xs bg-emerald-100 text-emerald-700 px-4 py-1 rounded-3xl">Avaa profiili →</span>
                        </div>
                    </div>
                </div>
            `).join('')
        }

        function openProfile(id) {
            const gig = allGigs.find(g => g.id === id)
            if (!gig) return

            document.getElementById('profileHeader').innerHTML = `
                <div class="text-5xl">${gig.emoji}</div>
                <div>
                    <h2 class="text-2xl font-semibold">${gig.title}</h2>
                    <p class="text-emerald-600">${gig.seller} • ${gig.location}</p>
                    <p class="text-amber-400">★ ${gig.rating} (${gig.reviewsCount})</p>
                </div>
            `

            document.getElementById('workImages').innerHTML = gig.images.map(src => 
                `<img src="${src}" class="rounded-2xl w-full aspect-video object-cover">`
            ).join('')

            document.getElementById('profileDesc').innerHTML = `<p class="text-lg">${gig.desc}</p>`

            document.getElementById('reviewsContainer').innerHTML = gig.reviews.map(r => `
                <div class="border-l-4 border-emerald-400 pl-6">
                    <div class="flex justify-between"><strong>${r.name}</strong><span class="text-amber-400">${'★'.repeat(r.stars)}</span></div>
                    <p class="mt-2">${r.text}</p>
                </div>
            `).join('')

            document.getElementById('profileModal').classList.remove('hidden')
            document.getElementById('profileModal').classList.add('flex')
        }

        function closeProfile() {
            document.getElementById('profileModal').classList.add('hidden')
            document.getElementById('profileModal').classList.remove('flex')
        }

        function performSearch() {
            const term = document.getElementById('searchInput').value.toLowerCase().trim()
            let filtered = allGigs
            if (term) {
                filtered = allGigs.filter(g => 
                    g.title.toLowerCase().includes(term) || 
                    g.seller.toLowerCase().includes(term) || 
                    g.location.toLowerCase().includes(term) ||
                    g.tags.some(t => t.includes(term))
                )
            }
            document.getElementById('resultsTitle').innerHTML = term ? `Tulokset "${term}" (${filtered.length})` : `Suosituimmat palvelut (${allGigs.length})`
            renderGigs(filtered)
        }

        function toggleMap() {
            const container = document.getElementById('mapContainer')
            container.classList.toggle('hidden')
            
            if (!container.classList.contains('hidden') && !map) {
                map = L.map('map').setView([64.5, 25], 6)
                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                    attribution: '&copy; OpenStreetMap'
                }).addTo(map)

                allGigs.forEach(g => {
                    if (g.lat && g.lng) {
                        const marker = L.marker([g.lat, g.lng]).addTo(map)
                        marker.bindPopup(`<b>${g.title}</b><br>${g.seller} • ${g.location}<br><button onclick="openProfile(${g.id});map.closePopup()" class="text-xs bg-emerald-600 text-white px-3 py-1 rounded-2xl mt-2">Avaa profiili</button>`)
                    }
                })
            }
        }

        // Muut toiminnot (lyhennettynä)
        function showCategoryExplorer() { /* ... */ 
            let html = ''
            categories.forEach(cat => {
                html += `<div class="mb-10"><div class="flex items-center gap-3 mb-4"><span class="text-4xl">${cat.emoji}</span><h3 class="text-2xl font-semibold">${cat.name}</h3></div>`
                html += `<div class="grid grid-cols-2 md:grid-cols-4 gap-3">`
                cat.subs.forEach(sub => html += `<div onclick="searchSub('${sub}')" class="bg-gray-50 hover:bg-emerald-50 p-4 rounded-2xl cursor-pointer">${sub}</div>`)
                html += `</div></div>`
            })
            document.getElementById('categoryContent').innerHTML = html
            document.getElementById('categoryModal').classList.remove('hidden')
            document.getElementById('categoryModal').classList.add('flex')
        }

        function hideCategoryModal() {
            document.getElementById('categoryModal').classList.add('hidden')
            document.getElementById('categoryModal').classList.remove('flex')
        }

        function searchSub(sub) {
            const filtered = allGigs.filter(g => g.sub === sub)
            document.getElementById('resultsTitle').innerHTML = `${sub} (${filtered.length})`
            renderGigs(filtered)
            hideCategoryModal()
        }

        function selectMainCategory(name) {
            const filtered = allGigs.filter(g => g.category === name)
            document.getElementById('resultsTitle').innerHTML = `${name} (${filtered.length})`
            renderGigs(filtered)
            hideCategoryModal()
        }

        function showPostModal() {
            const sel = document.getElementById('modalCategory')
            sel.innerHTML = categories.map(c => `<option>${c.name}</option>`).join('')
            document.getElementById('postModal').classList.remove('hidden')
            document.getElementById('postModal').classList.add('flex')
        }
        function publishGig() { alert("✅ Ilmoitus julkaistu!"); hidePostModal(); }
        function hidePostModal() {
            document.getElementById('postModal').classList.add('hidden')
            document.getElementById('postModal').classList.remove('flex')
        }
        function clearSearch() {
            document.getElementById('searchInput').value = ''
            document.getElementById('resultsTitle').innerHTML = `Suosituimmat palvelut (${allGigs.length})`
            renderGigs(allGigs)
        }

        window.onload = () => {
            generateGigs()
            renderMainCategories()
            renderGigs(allGigs)
            console.log('%c✅ TYÄKKÄRI valmis – profiilit ja kartta toimivat!', 'color:#10b981; font-size:14px')
        }
    </script>
</body>
</html>

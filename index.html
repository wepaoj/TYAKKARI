<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TYÄKKÄRI – Myy osaamistasi | Löydä osaaja</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=Space+Grotesk:wght@500&amp;display=swap');
        body { font-family: 'Inter', system_ui, sans-serif; }
        .logo-font { font-family: 'Space Grotesk', sans-serif; }
        .hero-bg { background: linear-gradient(90deg, #00c48c 0%, #00a86b 100%); }
        .card-hover { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .card-hover:hover { transform: translateY(-8px); box-shadow: 0 25px 50px -12px rgb(0 0 0 / 0.15); }
        #map { height: 480px; border-radius: 24px; }
    </style>
</head>
<body class="bg-gray-50">

    <!-- NAVBAR -->
    <nav class="bg-white border-b sticky top-0 z-50 shadow-sm">
        <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
            <div class="flex items-center gap-x-2">
                <div class="w-10 h-10 bg-emerald-500 rounded-3xl flex items-center justify-center text-white text-3xl">🛠️</div>
                <h1 class="logo-font text-4xl font-bold tracking-tighter text-emerald-600">TYÄKKÄRI</h1>
            </div>

            <div class="flex-1 max-w-2xl mx-8">
                <div class="relative">
                    <input id="searchInput" type="text" 
                           placeholder="Etsi palvelua tai kaupunkia... (esim. maalaus Helsinki)"
                           class="w-full bg-gray-100 border-2 border-transparent focus:border-emerald-500 h-14 pl-14 pr-6 rounded-3xl text-lg focus:outline-none"
                           onkeyup="if(event.key==='Enter') performSearch()">
                    <i class="fa-solid fa-magnifying-glass absolute left-6 top-1/2 -translate-y-1/2 text-emerald-500 text-2xl"></i>
                </div>
            </div>

            <div class="flex items-center gap-x-6">
                <button onclick="showCategoryExplorer()" 
                        class="flex items-center gap-x-2 text-emerald-700 hover:text-emerald-800 font-medium">
                    <i class="fa-solid fa-layer-group"></i>
                    <span>Kategoriat</span>
                </button>
                <button onclick="toggleMap()" class="flex items-center gap-x-2 text-emerald-700 hover:text-emerald-800 font-medium">
                    <i class="fa-solid fa-map"></i>
                    <span>Kartta</span>
                </button>
                <button onclick="showPostModal()" 
                        class="bg-emerald-600 hover:bg-emerald-700 text-white px-8 py-3 rounded-3xl font-semibold flex items-center gap-x-2 shadow-lg">
                    <i class="fa-solid fa-plus"></i> 
                    <span>MYY OSAAMISESI</span>
                </button>
            </div>
        </div>
    </nav>

    <!-- HERO -->
    <header class="hero-bg text-white py-20">
        <div class="max-w-7xl mx-auto px-6 text-center">
            <h1 class="text-6xl font-bold tracking-tighter mb-4">Löydä oikea osaaja.<br>Julkaiskaa taitosi.</h1>
            <p class="text-2xl text-emerald-100 max-w-2xl mx-auto">10 pääkategoriaa • Yli 100 ammattia • Kartalla • Suomalaisten tekemänä</p>
        </div>
    </header>

    <div class="max-w-7xl mx-auto px-6 py-10">
        <!-- Kategoria-painikkeet -->
        <div id="mainCategories" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-5 gap-4 mb-12"></div>

        <!-- Hakutulokset -->
        <div class="flex justify-between items-end mb-6">
            <h2 id="resultsTitle" class="text-3xl font-semibold">Suosituimmat palvelut</h2>
            <button onclick="clearSearch()" class="text-emerald-600 text-sm flex items-center gap-x-1">
                <i class="fa-solid fa-rotate"></i> Tyhjennä haku
            </button>
        </div>

        <div id="mapContainer" class="hidden mb-10">
            <div id="map"></div>
        </div>

        <div id="gigsGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6"></div>
    </div>

    <!-- KATEGORIA EXPLORER MODAL -->
    <div id="categoryModal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-[9999]">
        <div class="bg-white rounded-3xl max-w-5xl w-full mx-4 max-h-[90vh] overflow-hidden flex flex-col">
            <div class="px-8 py-6 border-b flex justify-between items-center">
                <h2 class="text-3xl font-semibold">Kaikki kategoriat</h2>
                <button onclick="hideCategoryModal()" class="text-4xl text-gray-400 hover:text-black">×</button>
            </div>
            <div class="flex-1 overflow-auto p-8" id="categoryContent">
                <!-- JS täyttää -->
            </div>
        </div>
    </div>

    <!-- JULKAISU MODAL -->
    <div id="postModal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-[9999]">
        <div class="bg-white rounded-3xl max-w-lg w-full mx-4 p-8">
            <h2 class="text-2xl font-semibold mb-6">Julkaise uusi palvelu</h2>
            <select id="modalCategory" class="w-full border rounded-2xl px-5 py-4 mb-4"></select>
            <input id="modalSub" type="text" placeholder="Tarkka ammattinimike (esim. Keittiön maalaus)" class="w-full border rounded-2xl px-5 py-4 mb-4">
            <input id="modalPrice" type="text" placeholder="Hinta alkaen" class="w-full border rounded-2xl px-5 py-4 mb-4">
            <input id="modalLocation" type="text" placeholder="Kaupunki" value="Helsinki" class="w-full border rounded-2xl px-5 py-4 mb-4">
            <button onclick="publishGig()" class="w-full bg-emerald-600 text-white py-4 rounded-3xl font-semibold">Julkaise ilmoitus</button>
        </div>
    </div>

    <script>
        // 10 PÄÄKATEGORIA + 10 ALAMAMMATIA
        const categories = [
            {
                name: "Rakentaminen & Remontti",
                emoji: "🏗️",
                subs: ["Maalaus", "Tapetointi", "Kylpyhuoneremontti", "Keittiöremontti", "Lattia-asennus", "Sähkötyöt", "Putkityöt", "Saunaremontti", "Parvekeremontti", "Rakentaminen"]
            },
            {
                name: "Kodin huolto & Siivous",
                emoji: "🧹",
                subs: ["Kotisiivous", "Muuttosiivous", "Ikkunoiden pesu", "Mattojen pesu", "Lumen luonti", "Puutarhanhoito", "Roskien vienti", "Kodinkoneiden korjaus", "Vesivahinkokorjaus", "Kodin yleishuolto"]
            },
            {
                name: "IT & Tekniikka",
                emoji: "💻",
                subs: ["Nettisivujen tekeminen", "Tietokoneen korjaus", "Vianhaku", "Tietokoneen kasaus", "Ohjelmointi", "Data-analyysi", "Puhelimen korjaus", "Verkon asennus", "Ohjelmistopäivitykset", "IT-tuki etänä"]
            },
            {
                name: "Taide & Luovuus",
                emoji: "🎨",
                subs: ["Muotokuvien piirtäminen", "Sävellys", "Laulun kirjoitus", "Valokuvaus", "Videokuvaus", "Graafinen suunnittelu", "Logon suunnittelu", "Maalaus tilauksesta", "Käsityöt", "Tanssiopetus"]
            },
            {
                name: "Opetus & Valmennus",
                emoji: "📚",
                subs: ["Matematiikan opetus", "Kielten opetus", "Soitonopetus", "Urheiluvalmennus", "Joogaopetus", "Koodauskoulutus", "Valokuvauskurssi", "Ruoanlaitto-opetus", "Autokouluopetus", "Yo-kurssit"]
            },
            {
                name: "Terveys & Hyvinvointi",
                emoji: "🧘",
                subs: ["Hieronta", "Personal trainer", "Fysioterapia", "Ravintovalmennus", "Hiusten leikkaus", "Meikkaus", "Parturipalvelut", "Psyykkinen valmennus", "Lifestyle coaching", "Rentoutus"]
            },
            {
                name: "Kuljetus & Liikenne",
                emoji: "🚚",
                subs: ["Muuttoapu", "Tavarakuljetus", "Auton korjaus", "Renkaiden vaihto", "Auton pesu", "Kuljetusapu", "Matkustajakuljetus", "Venekuljetus", "Moottoripyörähuolto", "Polkupyöräkorjaus"]
            },
            {
                name: "Juridiikka & Hallinto",
                emoji: "⚖️",
                subs: ["Asunto-oikeus", "Perheoikeus", "Sopimusten laadinta", "Yritysoikeus", "Perintöasiat", "Veroneuvonta", "Kirjanpito", "Tilitoimisto", "Yrityksen perustus", "Immateriaalioikeus"]
            },
            {
                name: "Markkinointi & Myynti",
                emoji: "📣",
                subs: ["Some-mainonta", "Google Ads", "Sisällöntuotanto", "Brändäys", "Valokuvaus tuotteille", "Myyntivalmennus", "Some-strategia", "Sähköpostimarkkinointi", "SEO-optimointi", "Videomainos"]
            },
            {
                name: "Eläimet & Muut",
                emoji: "🐶",
                subs: ["Koiran ulkoilutus", "Lemmikkien hoito", "Eläinlääkäri kotiin", "Hevoshuolto", "Eläinfotografia", "Lemmikkien trimmaus", "Kissanhoito", "Eläinten koulutus", "Avioliittoneuvoja", "Häät ja juhlat"]
            }
        ]

        let allGigs = [] // Täytetään dynaamisesti

        // Luo testidata kaikista alakategorioista
        function generateGigs() {
            allGigs = []
            let id = 1
            categories.forEach(cat => {
                cat.subs.forEach(sub => {
                    allGigs.push({
                        id: id++,
                        category: cat.name,
                        sub: sub,
                        title: sub,
                        price: ["Alkaen 49 €","Alkaen 89 €","Alkaen 129 €","Alkaen 35 €/h","Alkaen 199 €"][Math.floor(Math.random()*5)],
                        rating: (4 + Math.random()).toFixed(1),
                        reviews: Math.floor(Math.random()*120)+10,
                        seller: ["Juha M.","Anna K.","Pekka T.","Laura V.","Mikko R."][Math.floor(Math.random()*5)],
                        location: ["Helsinki","Espoo","Tampere","Turku","Oulu","Jyväskylä"][Math.floor(Math.random()*6)],
                        lat: 60 + Math.random()*6,
                        lng: 20 + Math.random()*10,
                        emoji: cat.emoji
                    })
                })
            })
        }

        function renderMainCategories() {
            const container = document.getElementById('mainCategories')
            container.innerHTML = categories.map(cat => `
                <div onclick="selectMainCategory('${cat.name}')" 
                     class="bg-white border-2 border-transparent hover:border-emerald-300 rounded-3xl p-6 cursor-pointer transition-all hover:shadow-xl">
                    <div class="text-5xl mb-4">${cat.emoji}</div>
                    <h3 class="font-semibold text-xl">${cat.name}</h3>
                    <p class="text-sm text-gray-500 mt-1">${cat.subs.length} ammattia</p>
                </div>
            `).join('')
        }

        function showCategoryExplorer() {
            let html = ''
            categories.forEach(cat => {
                html += `
                <div class="mb-10">
                    <div class="flex items-center gap-x-4 mb-4">
                        <span class="text-4xl">${cat.emoji}</span>
                        <h3 class="text-2xl font-semibold">${cat.name}</h3>
                    </div>
                    <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-5 gap-3">
                        ${cat.subs.map(sub => `
                            <div onclick="searchSub('${sub}')" 
                                 class="bg-gray-50 hover:bg-emerald-50 border border-transparent hover:border-emerald-200 px-5 py-4 rounded-2xl cursor-pointer text-sm font-medium">
                                ${sub}
                            </div>
                        `).join('')}
                    </div>
                </div>`
            })
            document.getElementById('categoryContent').innerHTML = html
            document.getElementById('categoryModal').classList.remove('hidden')
            document.getElementById('categoryModal').classList.add('flex')
        }

        function hideCategoryModal() {
            document.getElementById('categoryModal').classList.add('hidden')
            document.getElementById('categoryModal').classList.remove('flex')
        }

        function selectMainCategory(catName) {
            const cat = categories.find(c => c.name === catName)
            if (!cat) return
            const filtered = allGigs.filter(g => g.category === catName)
            document.getElementById('resultsTitle').innerHTML = `${cat.emoji} ${catName} <span class="text-emerald-500">(${filtered.length})</span>`
            renderGigs(filtered)
            hideCategoryModal()
        }

        function searchSub(sub) {
            const filtered = allGigs.filter(g => g.sub === sub || g.title.includes(sub))
            document.getElementById('resultsTitle').innerHTML = `Haku: ${sub} <span class="text-emerald-500">(${filtered.length})</span>`
            renderGigs(filtered)
            hideCategoryModal()
        }

        function renderGigs(gigs) {
            const container = document.getElementById('gigsGrid')
            container.innerHTML = gigs.map(g => `
                <div onclick="viewGig(${g.id})" class="card-hover bg-white border border-gray-100 rounded-3xl overflow-hidden cursor-pointer">
                    <div class="h-2 bg-emerald-500"></div>
                    <div class="p-6">
                        <div class="text-6xl mb-4">${g.emoji}</div>
                        <h4 class="font-semibold text-lg">${g.title}</h4>
                        <p class="text-emerald-600 font-medium">${g.price}</p>
                        <p class="text-xs text-gray-500 mt-4">${g.seller} • ${g.location}</p>
                        <div class="flex justify-between items-center mt-6 text-sm">
                            <span class="text-amber-400">★ ${g.rating}</span>
                            <button onclick="event.stopImmediatePropagation(); contact(${g.id})" 
                                    class="bg-emerald-600 text-white px-6 py-2 rounded-3xl text-xs">Ota yhteyttä</button>
                        </div>
                    </div>
                </div>
            `).join('')
        }

        function performSearch() {
            const term = document.getElementById('searchInput').value.toLowerCase()
            const filtered = allGigs.filter(g => 
                g.title.toLowerCase().includes(term) || 
                g.category.toLowerCase().includes(term) ||
                g.sub.toLowerCase().includes(term) ||
                g.location.toLowerCase().includes(term)
            )
            document.getElementById('resultsTitle').innerHTML = `Tulokset "${term}" <span class="text-emerald-500">(${filtered.length})</span>`
            renderGigs(filtered)
        }

        function publishGig() {
            alert("✅ Ilmoituksesi on julkaistu! Se näkyy nyt kategoriassa ja kartalla.")
            hidePostModal()
            // Lisää uusi gigi
            const newGig = {
                id: Date.now(),
                category: document.getElementById('modalCategory').value || "Rakentaminen & Remontti",
                sub: document.getElementById('modalSub').value || "Uusi palvelu",
                title: document.getElementById('modalSub').value || "Uusi palvelu",
                price: document.getElementById('modalPrice').value || "Alkaen 99 €",
                rating: "5.0",
                reviews: 1,
                seller: "Sinä",
                location: document.getElementById('modalLocation').value || "Helsinki",
                lat: 60.17,
                lng: 24.94,
                emoji: "🚀"
            }
            allGigs.unshift(newGig)
            renderGigs(allGigs)
        }

        function showPostModal() {
            const select = document.getElementById('modalCategory')
            select.innerHTML = categories.map(c => `<option>${c.name}</option>`).join('')
            document.getElementById('postModal').classList.remove('hidden')
            document.getElementById('postModal').classList.add('flex')
        }

        function hidePostModal() {
            document.getElementById('postModal').classList.add('hidden')
            document.getElementById('postModal').classList.remove('flex')
        }

        function viewGig(id) {
            const gig = allGigs.find(g => g.id === id)
            alert(`${gig.emoji} ${gig.title}\n\n${gig.seller} • ${gig.location}\nHinta: ${gig.price}\n\nHaluatko lähettää viestin?`)
        }

        function contact(id) {
            alert("💬 Viesti lähetetty! Saat vastauksen yleensä alle tunnissa.")
            event.stopImmediatePropagation()
        }

        // Kartta (sama kuin ennen)
        let map
        function initMap() {
            map = L.map('map').setView([64.5, 25], 6)
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map)
            updateMarkers(allGigs)
        }
        function updateMarkers(gigs) {
            // yksinkertainen toteutus – voit laajentaa
        }
        function toggleMap() {
            const c = document.getElementById('mapContainer')
            c.classList.toggle('hidden')
            if (!map && !c.classList.contains('hidden')) initMap()
        }

        function clearSearch() {
            document.getElementById('searchInput').value = ''
            document.getElementById('resultsTitle').innerHTML = `Suosituimmat palvelut`
            renderGigs(allGigs)
        }

        // Käynnistys
        window.onload = () => {
            generateGigs()
            renderMainCategories()
            renderGigs(allGigs)
            console.log('%cTYÄKKÄRI valmis 10 pääkategorialla!', 'color:#10b981;font-weight:bold')
        }
    </script>
</body>
</html>
